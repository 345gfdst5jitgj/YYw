<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>游戏菜单</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: "Microsoft YaHei", sans-serif;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 30px 0;
            font-size: 40px;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 20px 40px 60px;
            max-width: 1100px;
            margin: auto;
        }

        .item {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.25s;
            cursor: pointer;
        }

        .item:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.25);
        }

        .item img {
            width: 70px;
            margin-bottom: 15px;
        }

        .disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .disabled:hover {
            transform: none;
            box-shadow: none;
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <h1>🎮 游戏大厅</h1>

    <div class="grid">

        <!-- 第一个游戏 -->
        <div class="item" onclick="window.location.href='https://345gfdst5jitgj.github.io/modernclient/wasm/'">
            <img src="https://img.icons8.com/fluency/96/controller.png">
            <div>ModernClient</div>
        </div>

        <!-- 其他正在制作 -->
        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

    </div>

</body>
</html>
