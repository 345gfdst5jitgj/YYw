<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>游戏菜单</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #dcdcdc; /* 高级浅灰背景 */
            font-family: "Microsoft YaHei", sans-serif;
            color: #0d2b66;
        }

        h1 {
            text-align: center;
            padding: 35px 0 10px;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #0d2b66;
            text-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            color: #3a3a3a;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
            padding: 20px 40px 60px;
            max-width: 1200px;
            margin: auto;
        }

        .item {
            background: #ffffff;
            border: 3px solid #0d2b66; /* 深蓝边框 */
            border-radius: 18px;
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: 0.25s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* 卡片悬浮光效 */
        .item::before {
            content: "";
            position: absolute;
            top: -80px;
            left: -80px;
            width: 160px;
            height: 160px;
            background: rgba(13, 43, 102, 0.15);
            border-radius: 50%;
            transition: 0.4s ease;
            transform: scale(0);
        }

        .item:hover::before {
            transform: scale(1.8);
        }

        .item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
            background: #f8fbff;
        }

        .item img {
            width: 75px;
            margin-bottom: 15px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
        }

        .item div {
            font-size: 22px;
            font-weight: 600;
            color: #0d2b66;
        }

        /* 禁用项 */
        .disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .disabled:hover {
            transform: none;
            box-shadow: none;
            background: #ffffff;
        }
    </style>
</head>

<body>

    <h1>🎮 游戏大厅</h1>
    <div class="subtitle">请选择你要进入的游戏</div>

    <div class="grid">

        <!-- 第一个游戏 -->
        <div class="item" onclick="window.location.href='https://345gfdst5jitgj.github.io/modernclient/wasm/'">
            <img src="https://img.icons8.com/fluency/96/controller.png">
            <div>ModernClient</div>
        </div>

        <!-- 其他正在制作 -->
        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

        <div class="item disabled">
            <img src="https://img.icons8.com/fluency/96/hourglass.png">
            <div>正在制作</div>
        </div>

    </div>

</body>
</html>
